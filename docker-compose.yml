services:
  mysql:
    image: mysql:8
    container_name: mysql-colegio
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: colegio_db

    ports:
      - "3306:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 10

  ms-usuarios:
    build:
      context: ./ms_usuarios

    container_name: ms_usuarios
    restart: always

    ports:
      - "8082:8082"

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/colegio_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "1234"

  ms-academico:
    build:
      context: ./ms_academico

    container_name: ms_academico
    restart: always

    ports:
      - "8083:8083"

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/colegio_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "1234"

  bff:
    build:
      context: ./BFF

    container_name: bff
    restart: always

    ports:
      - "8081:8081"

    depends_on:
      - ms-usuarios
      - ms-academico